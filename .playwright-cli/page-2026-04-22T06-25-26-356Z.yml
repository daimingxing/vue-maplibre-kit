    - generic [ref=e144]:
      - generic [ref=e145]:
        - heading "DXF 配置速查" [level=3] [ref=e146]
        - paragraph [ref=e147]: 这里把插件壳、defaults 和常用筛选 / 分层 / 着色回调的含义一次性写全，方便业务层直接照着配。
      - paragraph [ref=e148]: "mapDxfExportPlugin 可配项： 1. enabled?: 是否启用整个 DXF 导出插件。 2. sourceRegistry: 必填，传当前页面的业务 sourceRegistry。 3. defaults?: 页面级默认导出配置，会覆盖封装层统一维护的全局默认 CRS。 可配字段：sourceIds / fileName / sourceCrs / targetCrs / featureFilter / layerNameResolver / layerTrueColorResolver / featureTrueColorResolver。 4. control?: 内置按钮配置。 可配字段：enabled / position / label。"
      - paragraph [ref=e149]: featureFilter(feature, sourceId)：返回 true 表示保留当前要素，返回 false 表示本次导出跳过当前要素。 layerNameResolver(feature, sourceId)：返回当前要素写入 DXF 的图层名。相同返回值的要素会被放进同一个 DXF 图层。 layerTrueColorResolver(layerName, sourceId)：返回图层 TrueColor；即使没有 layerNameResolver，默认按 sourceId 分层时也一样可用。 featureTrueColorResolver(feature, sourceId, layerName)：返回实体 TrueColor，优先级高于图层色，适合少量特殊要素。 当前示例页不预置任何颜色规则，只展示“全局入口 + 页面 defaults + 单次 overrides”的接法，避免把业务配色硬编码进示例页。 底层会自动清洗 DXF 非法图层名；如果不同来源最终落到同一 DXF 图层，也会在 warnings 里给出同名合层提示。